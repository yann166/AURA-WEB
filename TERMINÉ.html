<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>terminé</title>
    <link rel="stylesheet" href="terminé.css">
</head>
<body>
     
  <div id="loading-screen">
    <div class="house-loader">
      <div class="house-icon">🏠</div>
      <p class="loading-text">Chargement...</p>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>
  </div>

  
  <div id="video-screen">
    
    <video id="ma-video" src="yann.mp4" playsinline></video>
  </div>

  

  <script>
    function seConnecter() {
      
      const loginBox = document.getElementById('login-box');
      if (loginBox) loginBox.style.display = 'none';

      document.getElementById('loading-screen').style.display = 'flex';

      setTimeout(() => {
        document.getElementById('loading-screen').style.display = 'none';
        lancerVideo();
      }, 8000);
    }

    function lancerVideo() {
      const videoScreen = document.getElementById('video-screen');
      const video = document.getElementById('ma-video');

      videoScreen.style.display = 'block';
      video.play();

      
      videoScreen.addEventListener('click', allerPagePrincipale);
      
      video.addEventListener('ended', allerPagePrincipale);
    }

    function allerPagePrincipale() {
      window.location.href = 'index.html';
    }

    
    window.addEventListener('load', seConnecter);
  </script>

    
</body>
</html>
